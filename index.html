<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6ead0" />
    <title>Olundar: Imperial Survival Strategy</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/olundar-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="sun">O</span>
        <div>
          <h1>Olundar</h1>
          <p>Exploration | Survival | Imperial War</p>
        </div>
      </div>
      <div class="turnbox">
        <strong id="turnLabel">Turn 1</strong>
        <div class="top-actions">
          <button id="nextUnitTop" type="button">Next Unit</button>
          <button id="endTurnTop" type="button">End Turn</button>
          <button id="installTop" type="button" hidden>Install</button>
          <button id="audioTop" type="button" aria-pressed="false">Audio Off</button>
          <button id="settingsTop" type="button">Settings</button>
          <button id="saveTop" type="button">Save</button>
          <button id="loadTop" type="button">Load</button>
          <button id="newTop" type="button">New</button>
        </div>
      </div>
    </header>

    <div id="resourceBar" class="resourcebar" aria-live="polite"></div>
    <div id="modeBanner" class="mode-banner" hidden></div>
    <div id="setupOverlay" class="setup-overlay" hidden>
      <form id="campaignSetup" class="setup-dialog" role="dialog" aria-modal="true" aria-labelledby="campaignSetupTitle"></form>
    </div>
    <div id="saveOverlay" class="setup-overlay" hidden>
      <form id="saveManager" class="setup-dialog save-dialog" role="dialog" aria-modal="true" aria-labelledby="saveManagerTitle"></form>
    </div>
    <div id="settingsOverlay" class="setup-overlay" hidden>
      <form id="settingsPanel" class="setup-dialog settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle"></form>
    </div>
    <div id="recapOverlay" class="setup-overlay" hidden>
      <section id="recapPanel" class="setup-dialog recap-dialog" role="dialog" aria-modal="true" aria-labelledby="recapTitle"></section>
    </div>
    <input id="saveImportInput" type="file" accept="application/json,.json" hidden />

    <main class="layout">
      <section class="map-shell" aria-label="Olundar world map">
        <div id="mapLensBar" class="map-lens-bar" role="toolbar" aria-label="Strategic map lens"></div>
        <canvas id="gameCanvas" width="1280" height="860"></canvas>
        <div class="map-help">
          <span>Click unit -> click tile to move</span>
          <span>Click enemy in range to attack</span>
          <span>E ends turn | Esc cancels build</span>
        </div>
      </section>

      <aside class="side">
        <section id="selectionPanel" class="panel command-card"></section>
        <section id="actionPanel" class="panel order-card"></section>
        <section id="councilPanel" class="panel council"></section>
        <section id="guidePanel" class="panel guide"></section>
        <section id="operationsPanel" class="panel operations"></section>
        <section id="crisisPanel" class="panel crisis"></section>
        <section id="missionPanel" class="panel missions"></section>
        <section id="tilePanel" class="panel"></section>
        <section class="panel">
          <h2>Objectives</h2>
          <ol id="objectiveList" class="objectives"></ol>
        </section>
        <section id="diplomacyPanel" class="panel"></section>
        <section id="logPanel" class="panel chronicle"></section>
      </aside>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
